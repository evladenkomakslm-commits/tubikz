# Render Blueprint для ₮ubikz.
# Через Render Dashboard → Blueprints → "New Blueprint Instance" подхватит этот файл.

services:
  - type: web
    name: tubikz
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: |
      npm ci --no-audit --no-fund && \
      npx prisma generate && \
      npx prisma migrate deploy
    startCommand: npx tsx server.ts
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false                     # pooled Neon URL (с -pooler в host)
      - key: DIRECT_URL
        sync: false                     # прямой Neon URL (без -pooler) для миграций
      - key: NEXTAUTH_SECRET
        generateValue: true             # Render сгенерирует сам
      - key: NEXTAUTH_URL
        sync: false                     # будет https://<service>.onrender.com
      - key: UPLOADTHING_TOKEN
        sync: false                     # из UploadThing dashboard
