# nginx reverse proxy для ₮ubikz.
# Прокидывает HTTP + WebSocket (Socket.io path /api/socket).

upstream tubikz_app {
  server 127.0.0.1:3000;
  keepalive 64;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  listen [::]:80;
  server_name @SERVER_NAME@;

  client_max_body_size 30M;       # под загрузку медиа
  proxy_read_timeout 3600s;       # длинные WebSocket-сессии
  proxy_send_timeout 3600s;
  proxy_http_version 1.1;

  # Socket.io
  location /api/socket {
    proxy_pass         http://tubikz_app;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
  }

  # Всё остальное (Next.js)
  location / {
    proxy_pass         http://tubikz_app;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
  }

  # Полезные заголовки безопасности
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
